name: Release candidate
on:
  workflow_dispatch:
    inputs:
      version: {description: 'Version matching Directory.Build.props', required: true, default: '1.0.0'}
      prerelease: {description: 'Prerelease label', required: true, default: 'rc.1'}
      allow_unsigned: {description: 'Allow unsigned prerelease only', type: boolean, default: false}
      publish_release: {description: 'Publishing is disabled until remotely verified', type: boolean, default: false}
      generate_attestation: {description: 'Attestation readiness flag', type: boolean, default: false}
permissions:
  contents: read
concurrency: licensescope-production-release
jobs:
  build:
    if: github.ref_protected == true && inputs.publish_release == false
    runs-on: [self-hosted, windows, x64, licensescope-release]
    environment: production-release
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Verify protected runner prerequisites
        shell: powershell
        run: |
          if (-not $env:LICENSESCOPE_SBOM_TOOL) { throw 'Protected runner SBOM tool path is not configured.' }
          if (-not (Test-Path $env:LICENSESCOPE_SBOM_TOOL)) { throw 'SBOM tool is missing.' }
          if (-not (Test-Path 'C:\Program Files\Inno Setup 7\ISCC.exe')) { throw 'Inno Setup 7 is missing.' }
      - name: Build only; never publish
        shell: powershell
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          PRERELEASE_LABEL: ${{ inputs.prerelease }}
          ALLOW_UNSIGNED: ${{ inputs.allow_unsigned }}
        run: |
          $allowUnsigned = [bool]::Parse($env:ALLOW_UNSIGNED)
          .\build\Build-ReleaseCandidate.ps1 -Version $env:RELEASE_VERSION -PrereleaseLabel $env:PRERELEASE_LABEL -AllowUnsigned:$allowUnsigned -SbomToolPath $env:LICENSESCOPE_SBOM_TOOL -ExpectedSbomToolVersion 4.1.5 -OutputRoot .\artifacts\release
