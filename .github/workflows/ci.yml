name: CI
on:
  pull_request:
  push:
    branches: [main, 'feat/**']
  workflow_dispatch:
permissions:
  contents: read
jobs:
  validate:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Toolchain inventory
        shell: powershell
        run: dotnet --info
      - name: Local CI gates
        shell: powershell
        run: .\build\Invoke-CI.ps1 -Configuration All -Platforms AnyCPU,x86,x64
