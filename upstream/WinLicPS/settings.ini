# =============================================================================
# [KmsPiracyDomains]
# Known third-party KMS activation services on the public internet.
#
# HOW IT WORKS
# Any configured KMS server whose hostname contains one of these keywords
# (case-insensitive substring match) is immediately flagged as CRITICAL.
# The scan then also attempts DNS resolution to confirm the server is active.
#
# Microsoft does NOT provide public KMS servers. Any internet-facing KMS
# host is by definition an unauthorized activation service.
# =============================================================================
[KmsPiracyDomains]
msguides         ; km8.msguides.com, kms2.msguides.com, kms9.msguides.com
kms.loli         ; kms.loli.beer
digiboy.ir
0t.ng
kms.chinancce
kmscloud
kms.cangshui
kms.ddns.net
e8.us.to
kms.mrxinwang
kms8.msguides
kms9.msguides
kms.xspace.in
skms.netnr


# =============================================================================
# [DefaultPorts]
# TCP ports to probe on localhost for KMS server listeners.
# The app always probes port 1688. Add more here if needed by your environment.
# =============================================================================
[DefaultPorts]
1688


# =============================================================================
# [DefaultServices]
# Windows service name keywords to flag as suspicious KMS emulators.
# Matching is case-insensitive wildcard (*keyword*).
# The service Name AND DisplayName are both checked.
# =============================================================================
[DefaultServices]
KMSpico
KMService
WinKSO
KMSELDI
KMS_VL_ALL
KMSAuto
AutoKMS
KMSSS
KMSEmulator
vlmcsd
Activation-Renewal


# =============================================================================
# [DefaultTaskKeywords]
# Scheduled task name keywords to flag as suspicious.
# Matching is case-insensitive (*keyword* substring).
# =============================================================================
[DefaultTaskKeywords]
AutoKMS
KMSAuto
KMS_VL_ALL
KMSpico
KMSSS
KMSEmulator
KMService
WinKSO
vlmcsd
Activation-Renewal


# =============================================================================
# [DefaultProcesses]
# Process name keywords to flag as suspicious.
# Matching is case-insensitive (*keyword* substring). The .exe extension is optional.
# =============================================================================
[DefaultProcesses]
KMSpico
KMSELDI
AutoKMS
KMSAuto
KMSguard
WinKSO
KMService
vlmcsd
AAct
KMS_VL_ALL
gatherosstate


# =============================================================================
# [DefaultFilePaths]
# Absolute file/folder paths to check for activation tool traces.
# Environment variables are NOT supported here; use fully resolved paths.
# The app/script resolves %ProgramFiles%, %SystemRoot%, etc. at scan time
# for the built-in hardcoded paths. Entries here must be absolute.
# =============================================================================
[DefaultFilePaths]
; KMS38 / ClipSVC artifacts
C:\ProgramData\Microsoft\Windows\ClipSVC\GenuineTicket\GenuineTicket.xml
; MAS Online KMS renewal artifacts
C:\Program Files\Activation-Renewal\Activation_task.cmd
C:\Program Files\Activation-Renewal\Info.txt
; TSforge SPP store (checked for timestamp anomaly, not existence)
C:\Windows\System32\spp\store\2.0\data.dat

