# FORMAT RULES
# ------------
#   [SectionName]   -- section header (case-insensitive; underscores ignored)
#   value           -- one value per line
#   KEY = Label     -- key=value pairs (GVLK section uses this format)
#   ; comment       -- lines starting with ; or # are ignored
#   # comment
#
# =============================================================================


# =============================================================================
# [GvlkKeys]
# Windows Generic Volume License Keys (GVLKs) published by Microsoft.
# Source: https://learn.microsoft.com/en-us/windows-server/get-started/kms-client-activation-keys
#
# The app/script extracts the last 5 characters of each key and compares them
# to the PartialProductKey reported by WMI (Win32_SoftwareLicensingProduct).
#
# A GVLK combined with a permanent activation (no active KMS countdown) is
# flagged as ERROR -- genuine enterprise KMS clients always have an active
# 180-day renewal cycle; permanent GVLKs indicate HWID/TSforge/KMS38 piracy.
# =============================================================================
