# =============================================================================
# settings.ini  --  WinLic Manager (App + PowerShell CLI)
# Option 7 -- 3rd Party Activation Audit -- Scan Configuration
# =============================================================================
#
# This file is shared between WinLicApp (GUI) and WinLicManager.ps1 (CLI).
# Place it in the same folder as the executable / script.
#
# HOW IT WORKS
# ------------
# Built-in defaults are ALWAYS included and cannot be removed.
# Entries you add here are MERGED with the built-in defaults at scan time.
#
# COMMUNITY CONTRIBUTIONS
# -----------------------
# The [KmsPiracyDomains] section lists known third-party KMS activation
# services on the public internet.  If you discover a new one, please open
# a GitHub issue or pull request so it can be added to the built-in list:
#   https://github.com/ardennguyen/WinLic/issues
#
# FORMAT RULES
# ------------
#   [SectionName]   -- section header (case-insensitive; underscores ignored)
#   value           -- one value per line
#   ; comment       -- lines starting with ; or # are ignored
#   # comment
#
# Section name aliases (all equivalent):
#   [ExtraPorts]  =  [EXTRA_PORTS]  =  [extra_ports]
#
# =============================================================================


# =============================================================================
# [KmsPiracyDomains]
# Known third-party KMS activation services on the public internet.
#
# HOW IT WORKS
# Any configured KMS server whose hostname contains one of these keywords
# (case-insensitive substring match) is immediately flagged as CRITICAL.
# The scan then also attempts DNS resolution to confirm the server is active.
#
# Microsoft does NOT provide public KMS servers.  Any internet-facing KMS
# host is by definition an unauthorized activation service.
#
# BUILT-IN DEFAULTS (always active, listed here for reference):
#   msguides     -- km8.msguides.com, kms2.msguides.com, kms9.msguides.com
#   kms.loli     -- kms.loli.beer
#   digiboy.ir   -- kms.digiboy.ir
#   0t.ng        -- kms.0t.ng
#   kms.chinancce
#   kmscloud
#
# ADD YOUR OWN BELOW (one keyword per line, uncommented):
# To request a domain be added to the built-in list:
#   https://github.com/ardennguyen/WinLic/issues
# =============================================================================
[KmsPiracyDomains]
; my.custom.piracy.kms.example.com


# =============================================================================
# [ExtraPorts]
# Additional TCP ports to probe on localhost for KMS listeners.
#
# Built-in default: 1688  (standard Microsoft KMS port)
#
# When to add:
#   Some custom KMS emulators (e.g. vlmcsd with -P flag) can be configured
#   to listen on non-standard ports.  Add those ports here.
#
# Valid range: 1-65535  (non-integer lines are silently ignored)
# =============================================================================
[ExtraPorts]
; 1689
; 8080


# =============================================================================
# [ExtraServices]
# Additional Windows service name keywords to flag as suspicious.
#
# Built-in defaults:
#   KMSpico, KMService, WinKSO, KMSELDI, KMS_VL_ALL,
#   KMSAuto, AutoKMS, KMSSS, KMSEmulator, vlmcsd
#
# Matching is case-insensitive and uses a wildcard (*keyword*).
# The service Name AND DisplayName are both checked.
# =============================================================================
[ExtraServices]
; MyKmsService
; CustomActivator


# =============================================================================
# [ExtraTaskKeywords]
# Additional scheduled task name keywords to flag as suspicious.
#
# Built-in defaults:
#   AutoKMS, KMSAuto, KMS_VL_ALL, KMSpico, KMSSS,
#   KMSEmulator, KMService, WinKSO, vlmcsd
#
# Matching is case-insensitive (*keyword* substring).
# =============================================================================
[ExtraTaskKeywords]
; AutoActivate
; LicenseRenew


# =============================================================================
# [ExtraProcesses]
# Additional process name keywords to flag as suspicious.
#
# Built-in defaults:
#   KMSpico, KMSELDI, AutoKMS, KMSAuto, KMSguard,
#   WinKSO, KMService, vlmcsd, AAct, KMS_VL_ALL
#
# Matching is case-insensitive (*keyword* substring).
# The .exe extension is not required.
# =============================================================================
[ExtraProcesses]
; mykms.exe
; kms_server


# =============================================================================
# [ExtraFilePaths]
# Additional absolute file or folder paths to check for activation tool traces.
#
# Built-in defaults (resolved from system environment at scan time):
#   %ProgramFiles%\KMSpico
#   %ProgramFiles(x86)%\KMSpico
#   %APPDATA%\KMSpico
#   %ProgramData%\KMSpico
#   %SystemRoot%\System32\KMSELDI.exe
#   %ProgramFiles%\KMSAuto Net
#   %ProgramFiles(x86)%\KMSAuto Net
#   %ProgramFiles%\KMSAuto
#   %ProgramFiles(x86)%\KMSAuto
#   %SystemRoot%\KMS
#   %SystemRoot%\System32\SppExtComObj.exe.bak
#   %ProgramFiles%\AAct
#   %ProgramFiles(x86)%\AAct
#
# Provide FULL absolute paths.  Environment variables are NOT expanded here.
# =============================================================================
[ExtraFilePaths]
; C:\Tools\KMSTool
; C:\ProgramData\CustomKMS\server.exe
